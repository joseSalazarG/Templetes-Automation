name: Pruebas de Automatización

# Define los eventos que activarán el workflow
on:
  push:
    branches: [ allureReport ] # Ejecuta el workflow en pushes a la rama main

  permissions: write-all

  schedule:
    # Ejecuta a las 12:00 UTC (8:00 AM hora de Venezuela) los lunes, miércoles y viernes
    - cron: '0 11 * * 2,4'

  workflow_dispatch: # Ejecuta el workflow manualmente

jobs:
  test:
    runs-on: ubuntu-latest # Define el tipo de runner que ejecutará el job

    steps:
      # Realiza el checkout del código fuente
      - name: Checkout Code
        uses: actions/checkout@v4

      # Configura Java 17 usando Temurin
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'temurin'

      # Cachea las dependencias de Maven para mejorar los tiempos de ejecución
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Ejecuta tests y genera reporte, filtrando por la etiqueta @AdServer
      - name: Run tests and generate report
        run: mvn test "-Dcucumber.filter.tags=@Amyr"

      # Genera el reporte de las pruebas como un archivo HTML con el historial de pruebas
      - name:
        run: |
            cp -r src/test/resources/history target/allure-results
            allure generate target/allure-results --single-file reporte.html          

      # Genera el nuevo historial de pruebas
      - name: Generate history
        run: |
            allure generate target/allure-results -o target/allure-report
            cp -r --remove-destination target/allure-report/history src/test/resources 

      # Sube el archivo
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        with:
          name: reporte
          path: reporte.html

      # Envia un email con el reporte adjunto
      - name: Send email with zipped report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SECRET_EMAIL }} # Usa secretos para la autenticación
          password: ${{ secrets.SECRET_PASSWORD }}
          subject: Resultados de Automatización
          body: Se adjuntan los resultados de la última ejecución de pruebas.
          to:
          cc:
          from:
          ignore_cert: true
          attachments: reporte.html